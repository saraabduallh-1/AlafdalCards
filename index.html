<!doctype html>

    <meta charset="utf-8" />

    <title>تهنئة العيد 1447</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>

  <body>
    <main class="container">
      <!-- Header: عنوان بسيط -->
       
      <header class="header">
        <div class="header-row">
          <img src="./assets/logo.png" class="header-logo" alt="logo" />
          <div class="header-text">
            <h1>تهنئة عيد الأضحى 1447</h1>
            <p>صمّم تهنئتك بنفسك - اختر القالب، أضِف أسمك، ثم حمّلها</p>
          </div>
        </div>
      </header>

      <section class="layout">
        <!-- Controls: هنا كل عناصر التحكم -->
        <aside class="controls">
          <!-- اختيار القالب -->
          <label class="field">
            <span>اختر قالبك</span>
            <div class="select-wrap">
            <select id="templateSelect">
              <option value="template1" selected>التهنئة الأولى - ستوري أبيض </option>
              <option value="template2" selected>التهنئة الثانية - بوست أبيض </option>
              <option value="template3">التهنئة الثالثة - ستوري أخضر  </option>
              <option value="template4">التهنئة الرابعة - بوست أخضر </option>
            </select>
            </div>
          </label>

          <!-- إدخال الاسم -->
          <label class="field">
            <span>أضِف أسمك</span>
             <textarea
              id="nameInput"
              placeholder="مثال:محمد / Mohammad"
              rows="2"
              maxlength="50"
            ></textarea>



          </label>

          <!-- محاذاة النص -->


          <!-- زر تحميل PNG -->
          <button id="downloadBtn" class="btn primary">تحميل التهنئة PNG</button>

          <!-- زر نسخ رابط ذكي -->
          <button id="copyLinkBtn" class="btn secondary">
            مشاركة رابط التهنئة
          </button>

                    <button
  class="btn primary"
  onclick="window.open('https://email-signature-alafdal.vercel.app/','_blank')"
>
 موقع إنشاء التوقيع 
</button>
<br>
<br>
          <!-- رسالة صغيرة للعميل -->
          <center><small id="status" class="status"
          
          </style>
        
          </small>
        </aside>
        </center>


        <!-- Preview: معاينة القالب والاسم -->
        <div class="preview">
          <!-- Canvas: مساحة الرسم (نفس مقاس القالب 1080×1920) -->
          <canvas id="canvas" width="1080" height="1920"></canvas>



        </div>

      </section>
    </main>
